name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        # このジョブの run はすべて backend/ で実行する
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: uv をセットアップ
        uses: astral-sh/setup-uv@v5

      - name: 依存関係をロックファイルから復元
        run: uv sync --locked

      - name: テストを実行
        run: uv run pytest
